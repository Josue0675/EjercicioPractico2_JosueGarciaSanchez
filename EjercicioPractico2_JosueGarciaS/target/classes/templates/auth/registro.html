<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Registro')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4" style="max-width:700px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3>Registro de usuario</h3>
            <form th:action="@{/usuario/registrar}" method="post" th:object="${usuario}">
                <div class="mb-3"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
                <div class="mb-3"><label class="form-label">Correo</label><input class="form-control" type="email" th:field="*{email}" required></div>
                <div class="mb-3"><label class="form-label">Contraseña</label><input class="form-control" type="password" th:field="*{password}" required></div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select class="form-select" name="rol.id" required>
                        <option value="">Seleccione</option>
                        <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}"></option>
                    </select>
                </div>
                <button class="btn btn-primary" type="submit">Crear cuenta</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
