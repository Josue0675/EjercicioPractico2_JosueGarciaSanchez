<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Evento')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4">
    <form th:action="@{/evento/guardar}" method="post" th:object="${evento}">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
        <div class="mb-3"><label class="form-label">Descripción</label><textarea class="form-control" th:field="*{descripcion}" rows="4" required></textarea></div>
        <div class="mb-3"><label class="form-label">Fecha</label><input class="form-control" type="date" th:field="*{fecha}" required></div>
        <div class="mb-3"><label class="form-label">Capacidad máxima</label><input class="form-control" type="number" min="1" th:field="*{capacidad}" required></div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{activo}">
            <label class="form-check-label">Activo</label>
        </div>
        <button class="btn btn-primary">Guardar</button>
    </form>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
