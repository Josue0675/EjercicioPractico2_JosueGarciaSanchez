<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Inicio')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>

<div class="container my-4">
    <div class="p-4 p-md-5 mb-4 rounded text-bg-primary">
        <div class="col-lg-9">
            <h1 class="display-6">Plataforma de Reservas de Eventos</h1>
            <p class="lead">Aplicación web con gestión de usuarios, roles, eventos, seguridad, consultas y correo.</p>
            <a class="btn btn-light" th:href="@{/consulta/listado}">Ir a consultas</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6" th:each="e : ${eventos}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h4 th:text="${e.nombre}"></h4>
                    <p th:text="${e.descripcion}"></p>
                    <p class="mb-1"><strong>Fecha:</strong> <span th:text="${e.fecha}"></span></p>
                    <p class="mb-1"><strong>Capacidad:</strong> <span th:text="${e.capacidad}"></span></p>
                    <span class="badge text-bg-success" th:if="${e.activo}">Activo</span>
                    <span class="badge text-bg-secondary" th:if="${!e.activo}">Inactivo</span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
