<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Resultados de Usuarios')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4">
    <h3 th:text="${tituloConsulta}"></h3>
    <table class="table table-striped table-bordered">
        <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th></tr></thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol.nombre}"></td>
                <td th:text="${u.activo}"></td>
            </tr>
        </tbody>
    </table>
    <a class="btn btn-secondary" th:href="@{/consulta/listado}">Volver</a>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
