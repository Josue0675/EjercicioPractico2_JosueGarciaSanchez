<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Gestión de Usuarios')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4">
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="m-0">Gestión de Usuarios</h3>
        <a class="btn btn-primary" th:href="@{/usuario/nuevo}">Nuevo</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol.nombre}"></td>
                <td th:text="${u.activo}"></td>
                <td>
                    <a class="btn btn-info btn-sm" th:href="@{/usuario/detalle/{id}(id=${u.id})}">Detalle</a>
                    <a class="btn btn-warning btn-sm" th:href="@{/usuario/modificar/{id}(id=${u.id})}">Editar</a>
                    <a class="btn btn-danger btn-sm" th:href="@{/usuario/eliminar/{id}(id=${u.id})}" onclick="return confirm('¿Desea eliminar?');">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
