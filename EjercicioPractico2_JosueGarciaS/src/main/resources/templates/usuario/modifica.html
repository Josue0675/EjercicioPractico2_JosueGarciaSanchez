<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Usuario')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4">
    <form th:action="@{/usuario/guardar}" method="post" th:object="${usuario}">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
        <div class="mb-3"><label class="form-label">Correo</label><input class="form-control" type="email" th:field="*{email}" required></div>
        <div class="mb-3"><label class="form-label">Contraseña</label><input class="form-control" type="password" th:field="*{password}"></div>
        <div class="mb-3">
            <label class="form-label">Rol</label>
            <select class="form-select" name="rol.id" required>
                <option value="">Seleccione</option>
                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}" th:selected="${usuario != null and usuario.rol != null and usuario.rol.id == r.id}"></option>
            </select>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{activo}">
            <label class="form-check-label">Activo</label>
        </div>
        <button class="btn btn-primary">Guardar</button>
    </form>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
