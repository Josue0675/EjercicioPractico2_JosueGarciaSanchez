<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Gestión de Eventos')}"></head>
<body>
<header th:replace="~{general/fragmentos :: header}"></header>
<div class="container my-4">
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="m-0">Gestión de Eventos</h3>
        <a class="btn btn-primary" th:href="@{/evento/nuevo}">Nuevo</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Fecha</th><th>Capacidad</th><th>Activo</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:each="e : ${eventos}">
                <td th:text="${e.id}"></td><td th:text="${e.nombre}"></td><td th:text="${e.descripcion}"></td><td th:text="${e.fecha}"></td><td th:text="${e.capacidad}"></td><td th:text="${e.activo}"></td>
                <td>
                    <a class="btn btn-warning btn-sm" th:href="@{/evento/modificar/{id}(id=${e.id})}">Editar</a>
                    <a class="btn btn-danger btn-sm" th:href="@{/evento/eliminar/{id}(id=${e.id})}" onclick="return confirm('¿Desea eliminar?');">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
