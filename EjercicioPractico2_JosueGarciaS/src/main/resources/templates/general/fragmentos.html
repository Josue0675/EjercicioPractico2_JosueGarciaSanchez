<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
</head>
<body>
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">🎟️ Plataforma de Eventos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/usuario/listado}">Usuarios</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/rol/listado}">Roles</a></li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')"><a class="nav-link" th:href="@{/evento/listado}">Eventos</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/consulta/listado}">Consultas</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a sec:authorize="!isAuthenticated()" class="btn btn-light btn-sm" th:href="@{/login}">Login</a>
                    <a sec:authorize="!isAuthenticated()" class="btn btn-outline-light btn-sm" th:href="@{/usuario/registro}">Registro</a>
                    <span sec:authorize="isAuthenticated()" class="text-white small"><span sec:authentication="name"></span></span>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                        <button class="btn btn-light btn-sm" type="submit">Salir</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer">
    <footer class="bg-dark text-white mt-5">
        <div class="container py-3 text-center">
            Ejercicio Práctico 2 - Gestión de Eventos
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>
</body>
</html>
